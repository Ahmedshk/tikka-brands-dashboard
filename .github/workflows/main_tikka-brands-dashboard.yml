# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - tikka-brands-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build

      - name: Build server
        run: |
          cd server
          npm ci
          npm run build

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy/client
          cp -r server/node_modules server/package.json server/package-lock.json server/dist deploy/
          cp -r client/dist deploy/client/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v5
        with:
          name: node-app
          path: deploy
          overwrite: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v5
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_536C5093A9B54812AB987B5996D69F60 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_19335179EDC9449196093613F6950F8A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EE512CFCE91146649DD8A7076B4CC03F }}

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "tikka-brands-dashboard"
          slot-name: "Production"
          package: .
